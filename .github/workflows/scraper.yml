name: Playwright Scraper Test

on:
  # Chạy mỗi 10 phút
  schedule:
    - cron: '0 */8 * * *'
  push:
    branches:
      - main  # Hoặc 'master' tùy vào tên nhánh chính của bạn
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        # Chỉ cài Chromium để chạy cho nhanh và tiết kiệm dung lượng
        run: npx playwright install --with-deps chromium

      - name: Execute Scraper
        # Thay 'your-script.js' bằng file chính của bạn
        run: node scripts/capture-vietstock.js 
        env:
          # Đảm bảo môi trường không mở cửa sổ trình duyệt (Headless)
          HEADLESS: true

      - name: Archive Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output
          # Gom tất cả ảnh và file data cào được để kiểm tra
          path: |
            screenshots/
            *.json
            *.csv
            *.png
          retention-days: 1

      # BƯỚC DEBUG: Kiểm tra xem file có thực sự tồn tại không
      - name: List files for debugging
        run: |
          ls -R
          echo "Kiểm tra thư mục screenshots:"
          ls screenshots || echo "Thư mục screenshots trống hoặc không tồn tại"

      - name: Send Images to Discord
        if: success()
        run: node scripts/send-image.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}